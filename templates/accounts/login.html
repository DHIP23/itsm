<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — DSI ITSM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width: 100%; max-width: 420px; border-radius: 16px; border: none; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
    .login-header { background: #E87722; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .btn-dsi { background: #E87722; color: #fff; border: none; font-weight: 600; }
    .btn-dsi:hover { background: #C4611A; color: #fff; }
    .form-control:focus { border-color: #E87722; box-shadow: 0 0 0 .2rem rgba(232,119,34,.25); }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <i class="bi bi-headset text-white fs-1 d-block mb-2"></i>
      <h4 class="text-white fw-bold mb-0">DSI ITSM</h4>
      <p class="text-white-50 small mb-0">Portail de gestion des tickets</p>
    </div>
    <div class="card-body p-4">
      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Identifiant</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Votre identifiant" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-dsi w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
        </button>
      </form>
    </div>
    <div class="card-footer text-center text-muted small bg-light" style="border-radius:0 0 16px 16px;">
      DSI — Direction des Systèmes d'Information
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
